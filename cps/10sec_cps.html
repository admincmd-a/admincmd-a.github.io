<!DOCTYPE html>
<html>
<head>
  <title>10秒CPS测试器</title>
  <style>
    #clickArea {
      width: 300px;
      height: 200px;
      background-color: lightgray;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>10秒CPS测试器</h1>
  <p>点击下方区域开始测试。</p>
  
  <div id="clickArea" onclick="startTest()">
    点击这里
  </div>
  
  <script>
    var startTime, endTime;
    var clickCount = 0;
    
    function startTest() {
      clickCount = 0;
      startTime = new Date().getTime();
      
      document.getElementById('clickArea').innerHTML = "点击！";
      document.getElementById('clickArea').onclick = function() {
        clickCount++;
      };
      
      setTimeout(endTest, 10000);
    }
    
    function endTest() {
      endTime = new Date().getTime();
      var totalTime = (endTime - startTime) / 1000;
      var cps = Math.round(clickCount / totalTime);
      
      document.getElementById('clickArea').innerHTML = "测试完成！";
      document.getElementById('clickArea').onclick = null;
      
      alert("测试结果：\n点击次数: " + clickCount + "\n总时间: " + totalTime.toFixed(2) + "秒\nCPS: " + cps);
    }
  </script>
</body>
</html>
