<!DOCTYPE html>
<html>
<head>
  <title>60秒CPS测试器</title>
  <style>
    #clickArea {
      width: 300px;
      height: 200px;
      background-color: lightgray;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>60秒CPS测试器</h1>
  <p>点击下方区域开始测试。</p>
  
  <div id="clickArea" onclick="startTest()">
    点击这里
  </div>
  
  <div id="result" style="display: none;"></div>
  
  <script>
    var startTime, endTime;
    var clickCount = 0;
    
    function startTest() {
      clickCount = 0;
      startTime = new Date().getTime();
      
      document.getElementById('clickArea').innerHTML = "点击！";
      document.getElementById('clickArea').onclick = function() {
        clickCount++;
        updateDisplay();
      };
      
      setTimeout(endTest, 60000);
    }
    
    function endTest() {
      endTime = new Date().getTime();
      var totalTime = (endTime - startTime) / 1000;
      var cps = Math.round(clickCount / totalTime);
      
      document.getElementById('clickArea').innerHTML = "测试完成！";
      document.getElementById('clickArea').onclick = null;
      
      document.getElementById('result').innerHTML = "测试结果：<br>点击次数: " + clickCount + "<br>总时间: " + totalTime.toFixed(2) + "秒<br>CPS: " + cps;
      document.getElementById('result').style.display = "block";
    }
    
    function updateDisplay() {
      var currentTime = new Date().getTime();
      var elapsedTime = (currentTime - startTime) / 1000;
      var cps = Math.round(clickCount / elapsedTime);
      
      document.getElementById('result').innerHTML = "实时结果：<br>点击次数: " + clickCount + "<br>已用时间: " + elapsedTime.toFixed(2) + "秒<br>CPS: " + cps;
    }
  </script>
</body>
</html>
